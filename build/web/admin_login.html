<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaanare - Admin Login</title>
    
    <script>
        function showAdminMessage() {
            alert('Dear Admin : Email or Password not matched!!');
        }
        function loginFirst() {
            alert('Dear Admin : Please Login First !!');
        }
        function logoutMessage() {
            alert('Dear Admin : You have successfully logged out !!');
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-bg: #121212;
            --secondary-bg: #181818;
            --card-bg: #282828;
            --primary-text: #ffffff;
            --secondary-text: #b3b3b3;
            --accent-color: #1db954;
            --border-color: #333;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            display: flex;
            flex-wrap: wrap;
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin: 20px;
            max-width: 900px;
            width: 100%;
        }

        .welcome-image {
            flex: 1 1 400px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-image img {
            width: 100%;
            height: auto;
            max-width: 300px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 10px rgba(29, 185, 84, 0.3));
        }

        .login-form {
            flex: 1 1 400px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-logo img {
            width: 120px;
        }

        .login-form h4 {
            font-size: 24px;
            color: var(--primary-text);
            margin-bottom: 25px;
            text-align: center;
        }

        .login-form label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary-text);
            display: block;
        }

        .login-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--primary-text);
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .login-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1db954, #1ed760);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .login-container {
                margin: 15px;
                flex-direction: column;
            }
            .welcome-image {
                padding: 30px;
            }
            .welcome-image img {
                max-width: 200px;
            }
            .login-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="welcome-image">
            <img src="./images/others/adminImage.png" alt="Admin">
        </div>

        <div class="login-form">
            <div class="header-logo">
                <a href="index.html">
                    <img src="./images/web_images/logoGanare.png" alt="Gaanare Logo">
                </a>
            </div>
            <h4>Admin Login</h4>
            <form action="Admin_login" method="post">
                <label for="mail">Email Address</label>
                <input type="email" id="mail" name="mail" placeholder="Enter admin email" required>

                <label for="pwd">Password</label>
                <input type="password" id="pwd" name="pwd" placeholder="Enter admin password" required>
                
                <button type="submit">Secure Login</button>
            </form>
        </div>
    </div>
</body>
</html>
