<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaanare - Create Account</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary-bg: #09090b;
            --primary-text: #ffffff;
            --secondary-text: #a1a1aa;
            --accent-glow: rgba(139, 92, 246, 0.6);
            --accent-glow-secondary: rgba(59, 130, 246, 0.6);
            --accent-color: #8b5cf6;
            --accent-hover: #a78bfa;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 15% 50%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, var(--accent-glow-secondary) 0%, transparent 50%);
            z-index: -1;
            filter: blur(80px);
            animation: gradientMove 15s ease-in-out infinite alternate;
        }

        @keyframes gradientMove {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.2) translate(5%, -5%); }
            100% { transform: scale(1) translate(-5%, 5%); }
        }

        .header-logo {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 40px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .header-logo img {
            width: 160px;
            filter: drop-shadow(0px 0px 20px rgba(139, 92, 246, 0.8));
        }

        .header-logo p {
            color: var(--secondary-text);
            margin-top: 10px;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            width: 90%;
            max-width: 650px;
            padding: 50px 40px;
            border-radius: 24px;
            margin-bottom: 40px;
            position: relative;
        }

        /* Glowing top border */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0.8;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        h4 {
            text-align: center;
            color: var(--secondary-text);
            font-weight: 400;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--secondary-text);
        }

        input, select {
            width: 100%;
            padding: 16px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            background-color: rgba(0, 0, 0, 0.8);
        }

        select option {
            background-color: var(--primary-bg);
            color: #fff;
        }

        button {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--accent-color), #4f46e5);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            margin-top: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.5);
        }

        .back-login {
            text-align: center;
            margin-top: 30px;
            grid-column: 1 / -1;
            font-size: 15px;
        }

        .back-login a {
            color: var(--accent-hover);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-login a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
                width: 95%;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .form-group.full-width {
                grid-column: auto;
            }
            button, .back-login {
                grid-column: auto;
            }
        }
    </style>
    <script>
        function checkPasswords() {
            const pwd = document.getElementById('pwd').value;
            const pwd2 = document.getElementById('pwd2').value;
            const msg = document.getElementById('pwd-match-msg');
            if (pwd2.length === 0) { msg.textContent = ''; return; }
            if (pwd === pwd2) {
                msg.textContent = '✓ Passwords match';
                msg.style.color = '#10b981';
            } else {
                msg.textContent = '✗ Passwords do not match';
                msg.style.color = '#ef4444';
            }
        }
        function validateForm() {
            const pwd = document.getElementById('pwd').value;
            const pwd2 = document.getElementById('pwd2').value;
            if (pwd !== pwd2) {
                alert('Passwords do not match! Please re-enter your password.');
                return false;
            }
            if (pwd.length < 8) {
                alert('Password must be at least 8 characters long.');
                return false;
            }
            return true;
        }
    </script>
</head>
<body>

    <div class="header-logo">
        <a href="index.html">
            <img src="./images/web_images/logoGanare.png" alt="Gaanare Logo">
        </a>
        <p>Where Melodies Reflect The Soul</p>
    </div>

    <div class="container">
        <h2>Create an Account</h2>
        <h4>Join our community and explore unlimited music!</h4>

        <form action="Registration" method="post" class="form-grid">
            <div class="form-group full-width">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group full-width">
                <label for="mail">Email Address</label>
                <input type="email" id="mail" name="mail" placeholder="Enter your email address" required>
            </div>

            <div class="form-group full-width">
                <label for="pwd">Password <span style="color: var(--secondary-text); font-size: 12px;">(min. 8 characters)</span></label>
                <input type="password" id="pwd" name="pwd" placeholder="Create a strong password" required minlength="8">
            </div>

            <!-- Bug 35 Fix: Password confirmation field -->
            <div class="form-group full-width">
                <label for="pwd2">Confirm Password</label>
                <input type="password" id="pwd2" name="pwd2" placeholder="Re-enter your password" required minlength="8" oninput="checkPasswords()">
                <span id="pwd-match-msg" style="font-size: 12px; margin-top: 4px; display: block;"></span>
            </div>

            <div class="form-group">
                <label for="mob">Phone Number</label>
                <!-- Bug fixes: type tel, maxlength, pattern for 10-digit validation -->
                <input type="tel" id="mob" name="mob" placeholder="10-digit phone number" required maxlength="10" pattern="[0-9]{10}" title="Enter a 10-digit phone number">
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <!-- Bug fix: Added min/max age validation -->
                <input type="number" id="age" name="age" placeholder="Your age" required min="8" max="120">
            </div>

            <div class="form-group">
                <label for="lang">Preferred Language</label>
                <!-- Bug 36 Fix: Added all available language options -->
                <select id="lang" name="lang" required>
                    <option value="" disabled selected>-- Select Language --</option>
                    <option value="hindi">Hindi</option>
                    <option value="english">English</option>
                    <option value="punjabi">Punjabi</option>
                    <option value="bhojpuri">Bhojpuri</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <!-- Bug 37 Fix: Added empty placeholder so user must actively choose -->
                <select id="gender" name="gender" required>
                    <option value="" disabled selected>-- Select Gender --</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other / Prefer not to say</option>
                </select>
            </div>

            <button type="submit" onclick="return validateForm()">Sign Up</button>

            <div class="back-login">
                Already have an account? <a href="index.html#login">Log in here</a>
            </div>
        </form>
    </div>

</body>
</html>
