<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaanare - Email Sent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #09090b;
            --primary-text: #ffffff;
            --secondary-text: #a1a1aa;
            --accent-color: #8b5cf6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--primary-bg);
            color: var(--primary-text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background:
                radial-gradient(circle at 30% 50%, rgba(139, 92, 246, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(16, 185, 129, 0.3) 0%, transparent 50%);
            z-index: -1; filter: blur(80px);
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%; max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
        .success-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
        p { color: var(--secondary-text); margin-bottom: 30px; line-height: 1.6; }
        a {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 30px;
            background: linear-gradient(135deg, var(--accent-color), #4f46e5);
            color: white; border-radius: 12px;
            text-decoration: none; font-weight: 700;
            transition: all 0.3s ease;
        }
        a:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(139,92,246,0.5); }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h1>Email Sent!</h1>
        <p>We've sent a password reset link to your email address. Please check your inbox and follow the instructions to reset your password.</p>
        <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
    </div>
</body>
</html>
